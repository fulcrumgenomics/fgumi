name: Check and Test

on:
  push:
    branches:
      - main
  pull_request:

# Every job here only checks out the repo and runs read-only build/test/lint
# steps (the coverage upload authenticates with CODECOV_TOKEN, not the workflow
# token), so drop the inherited GITHUB_TOKEN down to read-only for all of them.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Set up compilation cache (sccache)
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Install nextest
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: nextest
      - name: Unit tests
        run: cargo ci-test
      - name: Doctests
        run: cargo ci-doctest

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - name: Set up compilation cache (sccache)
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Clippy check
        run: cargo ci-lint

  coverage:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    environment: github-actions
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Set up compilation cache (sccache)
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-llvm-cov
      - name: Install nextest
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: nextest
      - name: Generate coverage
        run: cargo llvm-cov nextest --workspace --features compare,simulate,profile-adjacency --no-tests=pass --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: Set up compilation cache (sccache)
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Rustfmt check
        run: cargo ci-fmt

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install cargo-audit
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-audit
      - name: Audit dependencies for known vulnerabilities
        run: cargo audit

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Set up compilation cache (sccache)
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Package every workspace crate (dry-run)
        # Validates manifest health for every publishable crate: declared
        # dependency versions on path deps, include = [...] paths, features
        # referring to real deps/features, no-publish flags, etc. Uses
        # --no-verify because cargo's workspace dry-run with --verify hits
        # an internal "no hash listed" error (cargo 1.93) when a later
        # crate transitively depends on an earlier crate's freshly packaged
        # tarball. Real-CI publish doesn't hit this -- each predecessor
        # resolves from crates.io with a real hash before the next verify.
        run: cargo publish --workspace --dry-run --allow-dirty --no-verify
      - name: Simulate publish-verify for crates with default-off optional deps
        # `cargo publish --verify` compiles the packaged tarball with DEFAULT
        # features only. For crates whose default feature set does NOT enable
        # every optional dependency, that build path is not exercised by the
        # regular workspace build (other crates often enable the optional
        # feature transitively), so "optional dep used unconditionally" bugs
        # can ship unnoticed and break publish mid-release.
        #
        # Add a crate to this list whenever it gains a default-off optional
        # dep. Current members:
        #   - fgumi-raw-bam: default = [], `noodles`/`anyhow` behind feature
        run: cargo check -p fgumi-raw-bam --no-default-features --all-targets

  no-default-features-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Set up compilation cache (sccache)
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: cargo check --workspace --no-default-features --all-targets
        # The regular test/lint jobs run with default features enabled, which
        # pulls in every optional dependency transitively. That hides two
        # classes of bug from CI:
        #   1. Optional deps used unconditionally (library behind a feature
        #      gate referenced from non-gated code).
        #   2. Modules behind a non-default feature referenced from
        #      always-compiled code.
        # Both manifest as compile failures only under
        # `default-features = false`, which is exactly what downstream
        # consumers can opt into. This job compiles every workspace crate
        # (lib + tests + benches) with no default features to surface
        # regressions at PR time.
        run: cargo check --workspace --no-default-features --all-targets

  msrv-lockstep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: rust-version matches the pinned toolchain
        # We support exactly the Rust we develop and test on: `rust-version`
        # (the published MSRV) is kept identical to the `channel` in
        # rust-toolchain.toml. This fails if the two drift, so neither can be
        # bumped without the other. Because every other job builds on the
        # rust-toolchain.toml channel, keeping them equal means all of CI
        # already verifies the MSRV builds -- no separate MSRV build job needed.
        run: |
          set -euo pipefail
          msrv=$(grep -m1 -E '^rust-version' Cargo.toml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          chan=$(grep -m1 -E '^channel' rust-toolchain.toml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "Cargo.toml rust-version = $msrv"
          echo "rust-toolchain.toml channel = $chan"
          if [ "$msrv" != "$chan" ]; then
            echo "::error::MSRV ($msrv) and pinned toolchain ($chan) have drifted; keep them in lockstep." >&2
            exit 1
          fi

  docs:
    runs-on: ubuntu-latest
    # Turn every rustdoc warning (broken intra-doc links, private-item links,
    # etc.) into a hard error. This gates doc *build* and link health; doctest
    # *execution* (running the `///` examples) is a separate concern not covered
    # here — nextest does not run doctests either.
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Set up compilation cache (sccache)
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Build documentation
        run: cargo ci-doc

  sort-correctness:
    runs-on: ubuntu-latest
    # This job only reads the repository -- it builds and runs tests, and never
    # writes back to GitHub. Drop the default GITHUB_TOKEN scopes to read-only so
    # the token exposed to test code cannot mutate the repo.
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Set up compilation cache (sccache)
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Install nextest
        uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: nextest
      - name: Install samtools
        # The sort-correctness suites (tests/integration/test_sort_correctness.rs,
        # test_async_reader.rs, test_sort_write_index.rs) need the `samtools` binary to
        # build BAM fixtures, count records, and query the fgumi-written .bai index.
        # Sort ordering itself is verified by `fgumi sort --verify` (fgumi's own order
        # checker), not by diffing against `samtools sort` — this job gates internal
        # sort-correctness, not samtools output parity. These tests are `#[ignore]`d
        # because they need samtools; without this job they never run in CI, so
        # sort-correctness was ungated. samtools is taken from the runner's apt repo —
        # the tests never parse samtools' record order, so they do not depend on a
        # specific samtools patch version.
        run: sudo apt-get update && sudo apt-get install -y samtools
      - name: Verify samtools is on PATH
        # The samtools-gated suites early-return when `samtools_available()`
        # (which shells out to `samtools --version`) is false, so a missing binary
        # would let this job pass without running any of them. Fail loudly instead:
        # this asserts the exact predicate the tests gate on.
        run: samtools --version
      - name: Run samtools-gated sort-correctness tests
        run: cargo ci-test-samtools
