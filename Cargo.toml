[workspace]
members = [".", "crates/fgumi-derive", "crates/fgumi-raw-bam", "crates/fgumi-dna", "crates/fgumi-bgzf", "crates/fgumi-metrics", "crates/fgumi-sam", "crates/fgumi-simd-fastq", "crates/fgumi-umi", "crates/fgumi-consensus", "crates/fgumi-lib", "crates/fgumi-pipeline"]
resolver = "2"

[workspace.package]
version = "0.1.2"
edition = "2024"
rust-version = "1.87.0"
repository = "https://github.com/fulcrumgenomics/fgumi"
license = "MIT"

[workspace.dependencies]
# Internal crates
fgumi-bgzf = { version = "0.1.2", path = "crates/fgumi-bgzf" }
fgumi-derive = { version = "0.1.2", path = "crates/fgumi-derive" }
fgumi-consensus = { version = "0.1.2", path = "crates/fgumi-consensus", default-features = false }
fgumi-dna = { version = "0.1.2", path = "crates/fgumi-dna" }
fgumi-lib = { version = "0.1.2", path = "crates/fgumi-lib", default-features = false }
fgumi-pipeline = { version = "0.1.2", path = "crates/fgumi-pipeline" }
fgumi-metrics = { version = "0.1.2", path = "crates/fgumi-metrics" }
fgumi-raw-bam = { version = "0.1.2", path = "crates/fgumi-raw-bam" }
fgumi-sam = { version = "0.1.2", path = "crates/fgumi-sam" }
fgumi-simd-fastq = { version = "0.1.2", path = "crates/fgumi-simd-fastq" }
fgumi-umi = { version = "0.1.2", path = "crates/fgumi-umi" }

# Third-party dependencies shared across workspace crates
ahash = "0.8"
anyhow = "1.0.102"
approx = "0.5.1"
bgzf = "0.3.0"
bstr = "1.12.1"
bytemuck = { version = "1.14", features = ["derive"] }
bytes = "1"
clap = { version = "4", features = ["derive"] }
crc32fast = "1.4"
crossbeam-channel = "0.5"
crossbeam-queue = "0.3"
crossbeam-utils = "0.8.21"
flate2 = "1.1"
fgoxide = "0.6.0"
libdeflater = "1.22"
libmimalloc-sys = { version = "0.1.44", features = ["extended"] }
log = "0"
lru = "0.16.3"
memchr = "2"
noodles = { version = "0.106.0" }
noodles-bgzf = { version = "0.46.0", features = ["libdeflate"] }
noodles-csi = "0.54.0"
parking_lot = "0.12"
rand = "0.10"
rand_distr = "0.6"
rayon = "1.10"
read-structure = "0.2.0"
serde = { version = "1.0.228", features = ["derive"] }
sysinfo = { version = "0.38", default-features = false, features = ["system"] }
tempfile = "3.3.0"
thiserror = "2"
which = "7"
wide = "1.1"
seq_io = "0.3.4"

# Shared dev-dependencies
criterion = { version = "0.8", features = ["html_reports"] }
proptest = "1.10"
rstest = "0"

[package]
name = "fgumi"
version.workspace = true
authors = ["Nils Homer <nils@fulcrumgenomics.com>", "Tim Fennell <tim@fulcrumgenomics.com>"]
description = "High-performance tools for UMI-tagged sequencing data: extraction, grouping, and consensus calling"
repository.workspace = true
homepage = "https://github.com/fulcrumgenomics/fgumi"
documentation = "https://docs.rs/fgumi"
readme = "README.md"
categories = ["command-line-utilities", "science"]
keywords = ["bioinformatics", "umi", "consensus", "sequencing", "ngs"]
license.workspace = true
edition.workspace = true
rust-version.workspace = true

[dependencies]
ahash = { workspace = true }
anyhow = { workspace = true }
approx = { workspace = true }
bgzf = { workspace = true }
bstr = { workspace = true }
bytemuck = { workspace = true }
bytes = { workspace = true }
bytesize = "2.3"
clap = { workspace = true, features = ["string"] }
crc32fast = { workspace = true }
crossbeam-channel = { workspace = true }
crossbeam-queue = { workspace = true }
crossbeam-utils = { workspace = true }
csv = "1.1"
dhat = { version = "0.3", optional = true }
env_logger = "0.11.8"
enum_dispatch = "0.3.13"
fgoxide = { workspace = true }
flate2 = { workspace = true }
indexmap = "2"
itertools = "0.14.0"
libdeflater = { workspace = true }
libmimalloc-sys = { workspace = true, optional = true }
log = { workspace = true }
lru = { workspace = true }
memchr = { workspace = true }
mimalloc = { version = "0.1.48", default-features = false }
murmur3 = "0.5"
noodles = { workspace = true, features = ["bam", "fasta", "sam", "bgzf", "core", "vcf"] }
noodles-bgzf = { workspace = true }
noodles-csi = { workspace = true }
parking_lot = { workspace = true }
rand = { workspace = true }
rand_distr = { workspace = true }
rayon = { workspace = true }
read-structure = { workspace = true }
serde = { workspace = true }
statrs = "0.18"
sysinfo = { workspace = true, optional = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
wide = { workspace = true }
fgumi-derive = { workspace = true }
fgumi-lib = { workspace = true }
fgumi-pipeline = { workspace = true }
fgumi-raw-bam = { workspace = true, features = ["noodles"] }
fgumi-dna = { workspace = true }
fgumi-bgzf = { workspace = true }
fgumi-metrics = { workspace = true }
fgumi-sam = { workspace = true }
fgumi-simd-fastq = { workspace = true }
fgumi-umi = { workspace = true }
fgumi-consensus = { workspace = true }

[features]
default = ["simplex", "duplex", "codec"]
simplex = ["fgumi-lib/simplex", "fgumi-consensus/simplex"]
duplex = ["fgumi-lib/duplex", "fgumi-consensus/duplex"]
codec = ["fgumi-lib/codec", "fgumi-consensus/codec"]
dhat-heap = ["dep:dhat"]
# Enable comprehensive memory debugging infrastructure (monitor thread, hot-path atomics, CLI args)
memory-debug = ["fgumi-lib/memory-debug", "dep:libmimalloc-sys", "dep:sysinfo"]
# Enable compare subcommand with bams and metrics (developer tools)
compare = ["fgumi-lib/compare"]
# Enable simulate commands for generating synthetic test data
simulate = ["fgumi-lib/simulate"]
# Enable profiling output for adjacency UMI assigner
profile-adjacency = ["fgumi-lib/profile-adjacency"]
# Enable slow stress tests for concurrency testing
stress-tests = ["fgumi-lib/stress-tests"]

[dev-dependencies]
rstest = { workspace = true }
proptest = { workspace = true }
criterion = { workspace = true }
fgumi-raw-bam = { workspace = true, features = ["test-utils"] }

[[bench]]
name = "core_functions"
harness = false

[build-dependencies]
built = { version = "0", features = ["git2"] }

[profile.release]
#lto = true
lto = "fat"
codegen-units = 1

[profile.profiling]
inherits = "release"
debug = "line-tables-only"
