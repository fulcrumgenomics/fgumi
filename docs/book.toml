[book]
title = "fgumi"
description = "High-performance tools for UMI-tagged sequencing data"
authors = ["Fulcrum Genomics"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
additional-css = ["theme/custom.css"]
git-repository-url = "https://github.com/fulcrumgenomics/fgumi"
edit-url-template = "https://github.com/fulcrumgenomics/fgumi/edit/main/docs/{path}"
no-section-label = true

[output.html.search]
enable = true

[output.html.fold]
enable = true
level = 1
